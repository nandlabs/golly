name: "CodeQL Analysis"

on:
    push:
        branches:
            - "main"
    pull_request:
        branches:
            - "main"
    schedule:
        # Run weekly on Monday at 00:00 UTC
        - cron: "0 0 * * 1"

jobs:
    codeql:
        uses: nandlabs/oss-workflows/.github/workflows/go-codeql.yml@main
        permissions:
            actions: read
            contents: read
            security-events: write
        with:
            go-version: "1.25"
