name: "Dependency Review"

on:
    pull_request:
        branches:
            - "main"

jobs:
    dependency-review:
        uses: nandlabs/oss-workflows/.github/workflows/go-dependency-review.yml@main
        permissions:
            contents: read
            pull-requests: write
        with:
            fail-on-severity: "moderate"
            allow-licenses: "MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC"
